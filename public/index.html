<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyMediaServer</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230f0f1a'/%3E%3Ctext x='50%25' y='65%25' font-size='50' text-anchor='middle' fill='%23f2a900'%3E📺%3C/text%3E%3C/svg%3E">
</head>
<body>

<!-- 🔐 LOGIN SCREEN -->
<div id="loginScreen" class="login-screen">
    <div class="login-box">
        <div class="lock-icon">🔐</div>
        <h1>MyMediaServer</h1>
        <input type="text" id="loginUser" placeholder="Usuario" value="admin">
        <input type="password" id="loginPass" placeholder="Contraseña" value="admin123">
        <button onclick="doLogin()" class="btn-login">Entrar</button>
        <p id="loginError" class="error-text"></p>
    </div>
</div>

<!-- HEADER PRINCIPAL -->
<header class="header" style="display:none;">
    <div class="header-left">
        <button id="backBtn" class="back-btn" onclick="goBack()" style="display:none;"><i class="fas fa-arrow-left"></i> Atrás</button>
        <div class="logo" onclick="showHome()">📺 MyMediaServer</div>
    </div>
    <div class="search-container">
        <i class="fas fa-search search-icon"></i>
        <input type="text" id="searchInput" placeholder="Buscar..." onkeyup="searchMedia()">
    </div>
    <div class="user-info">
        👤 <span id="currentUserText">Usuario</span>
        <button onclick="logout()" class="btn-logout"><i class="fas fa-sign-out-alt"></i></button>
    </div>
</header>

<!-- MENÚ DE NAVEGACIÓN -->
<nav class="nav-menu" style="display:none;">
    <ul>
        <li><a href="#" onclick="showHome(); return false;" class="active"><i class="fas fa-home"></i> Inicio</a></li>
        <li><a href="#" onclick="showIPTV(); return false;"><i class="fas fa-tv"></i> TV en Vivo</a></li>
        <li><a href="#" onclick="toggleView(); return false;"><i class="fas fa-folder-open"></i> Gestor</a></li>
        <li><a href="#"><i class="fas fa-music"></i> Música</a></li>
    </ul>
</nav>

<!-- CONTENEDOR PRINCIPAL -->
<main class="container" style="display:none;">
    <!-- Panel de Administración -->
    <div id="adminPanel" style="display:none;" class="admin-panel">
        <h3><i class="fas fa-users-cog"></i> Administración de Usuarios</h3>
        <div class="new-user-form">
            <input type="text" id="newUser" placeholder="Usuario">
            <input type="password" id="newPass" placeholder="Contraseña">
            <input type="text" id="newName" placeholder="Nombre completo">
            <select id="newRole">
                <option value="user">Usuario</option>
                <option value="admin">Administrador</option>
            </select>
            <button onclick="createUser()"><i class="fas fa-plus"></i> Crear</button>
        </div>
        <h4>Usuarios existentes:</h4>
        <ul id="usersList"></ul>
    </div>

    <!-- Breadcrumbs -->
    <div id="breadcrumbs" class="breadcrumbs">
        <span onclick="goHome()">📁 Biblioteca</span>
    </div>

    <!-- Sección de título dinámico -->
    <h2 class="section-title" id="sectionTitle">📁 Biblioteca Principal</h2>

    <!-- Grid de Películas / Series -->
    <div id="mediaGrid" class="grid-container"></div>

    <!-- Sección IPTV -->
    <div id="iptvSection" style="display:none;">
        <h2><i class="fas fa-satellite-dish"></i> Televisión en Vivo</h2>
        <div class="iptv-config">
            <input type="text" id="iptvUrl" placeholder="URL de tu lista .m3u o .m3u8">
            <button onclick="saveIPTVConfig()"><i class="fas fa-cloud-download-alt"></i> Cargar Lista</button>
        </div>
        <div class="iptv-grid" id="iptvGrid"></div>
    </div>

    <!-- Gestor de Archivos -->
    <div id="fileManager" style="display:none;">
        <h2><i class="fas fa-folder"></i> Gestor de Archivos</h2>
        <div class="upload-area">
            <input type="file" id="fileInput" multiple>
            <button onclick="uploadFile()"><i class="fas fa-upload"></i> Subir Archivos</button>
        </div>
        <table class="file-table">
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Tamaño</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="fileListBody"></tbody>
        </table>
    </div>
</main>

<!-- Modal del Reproductor -->
<div id="playerModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closePlayer()">&times;</span>
        <video id="videoPlayer" controls controlsList="nodownload">
            <source src="" id="videoSource">
            <track id="subtitleTrack" kind="subtitles" src="" srclang="es" label="Español" default>
        </video>
        <div id="currentVideoTitle" class="player-title"></div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
