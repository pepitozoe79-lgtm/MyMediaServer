<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyMediaServer - Premium VOD</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23e50914'/%3E%3Ctext x='50%25' y='65%25' font-size='50' text-anchor='middle' fill='white'%3E📺%3C/text%3E%3C/svg%3E">
</head>
<body>

<!-- 🔐 LOGIN SCREEN -->
<div id="loginScreen" class="login-screen">
    <div class="login-box">
        <div class="lock-icon"><i class="fas fa-lock"></i></div>
        <h1>MyMediaServer</h1>
        <input type="text" id="loginUser" placeholder="Usuario" value="admin">
        <input type="password" id="loginPass" placeholder="Contraseña" value="admin123">
        <button onclick="doLogin()" class="btn-login">Entrar</button>
        <p id="loginError" class="error-text"></p>
    </div>
</div>

<div id="appContainer" style="display: none;">
    <!-- HEADER -->
    <header class="header">
        <div class="header-left">
            <div class="logo" onclick="showHome()">MyMediaServer</div>
            <button id="backBtn" class="back-btn" onclick="goBack()" style="display:none;">
                <i class="fas fa-arrow-left"></i> Atrás
            </button>
        </div>

        <div class="search-container">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="searchInput" placeholder="Search movies, shows..." onkeyup="searchMedia()">
        </div>

        <div class="user-info">
            <span id="currentUserText">Administrator</span>
            <button onclick="logout()" class="btn-logout" title="Cerrar sesión">Logout</button>
        </div>
    </header>

    <!-- NAV MENU -->
    <nav class="nav-menu">
        <ul>
            <li><a href="#" class="active" id="navHome" onclick="showHome(); return false;">Inicio</a></li>
            <li><a href="#" id="navIPTV" onclick="showIPTV(); return false;">Live TV</a></li>
            <li><a href="#" id="navFiles" onclick="toggleView(); return false;">Archivos</a></li>
            <li id="navAdminItem" style="display: none;"><a href="#" onclick="showAdmin(); return false;">Admin</a></li>
        </ul>
    </nav>

    <!-- MAIN CONTENT -->
    <main class="container">
        <!-- Panel de Administración -->
        <div id="adminPanel" style="display:none;" class="admin-panel">
            <h2 class="section-title"><i class="fas fa-users-cog"></i> Gestión de Usuarios</h2>
            <div class="new-user-form">
                <input type="text" id="newUser" placeholder="Usuario">
                <input type="password" id="newPass" placeholder="Contraseña">
                <input type="text" id="newName" placeholder="Nombre completo">
                <select id="newRole">
                    <option value="user">Usuario</option>
                    <option value="admin">Administrador</option>
                </select>
                <button class="btn-primary" onclick="createUser()">Crear Usuario</button>
                <button class="btn-primary" style="background: #007bff;" onclick="updateServer()"><i class="fas fa-sync-alt"></i> Actualizar Servidor</button>
            </div>
            <h4>Usuarios Activos</h4>
            <ul id="usersList" style="margin-top: 1rem; list-style: none;"></ul>
        </div>

        <!-- HOME SECTION -->
        <div id="mediaHomeSection">
            <div id="breadcrumbs" class="breadcrumbs"></div>

            <!-- Continue Watching -->
            <div id="continueWatchingWrapper" style="display:none;">
                <h2 class="section-title">Seguir viendo</h2>
                <div class="grid-container" id="continueGrid">
                    <!-- Tarjetas irán aquí -->
                </div>
            </div>

            <h2 class="section-title" id="libraryTitle">Biblioteca</h2>
            <div id="mediaGrid" class="grid-container">
                <!-- Tarjetas irán aquí -->
            </div>
        </div>

        <!-- IPTV SECTION -->
        <div id="iptvSection" style="display:none;">
            <h2 class="section-title">Televisión en Vivo</h2>
            <div class="iptv-config">
                <input type="text" id="iptvUrl" placeholder="URL de la lista M3U">
                <button class="btn-primary" onclick="saveIPTVConfig()">Cargar Canales</button>
            </div>
            <div class="iptv-grid" id="iptvGrid"></div>
        </div>

        <!-- FILE MANAGER SECTION -->
        <div id="fileManager" style="display:none;">
            <h2 class="section-title">Explorador de Archivos</h2>
            <div class="upload-area">
                <input type="file" id="fileInput" multiple>
                <button class="btn-primary" onclick="uploadFile()">Subir Archivos</button>
            </div>
            <table class="file-table">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Tamaño</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="fileListBody"></tbody>
            </table>
        </div>
    </main>
</div>

<!-- Modal del Reproductor -->
<div id="playerModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closePlayer()">&times;</span>
        <video id="videoPlayer" controls>
            <source src="" id="videoSource">
            <track id="subtitleTrack" kind="subtitles" src="" srclang="es" label="Español" default>
        </video>
        <div id="currentVideoTitle" class="player-title"></div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
